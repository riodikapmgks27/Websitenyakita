<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Bukti Pembayaran</title>
<link rel="stylesheet" href="domain_basic/pembayaran_basic.css">
</head>
<body>

<div class="payment-container">
    <h2>Upload Bukti Pembayaran</h2>
    <form id="uploadForm">
        <label>Pilih file bukti pembayaran (jpg/png/pdf):</label>
        <input type="file" id="fileUpload" accept=".jpg,.png,.pdf" required>
        <button type="submit" class="btn-upload">Upload</button>
    </form>
</div>

<script src="domain_basic/upload.js"></script>
</body>
</html>
